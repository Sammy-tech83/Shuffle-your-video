<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Video Shuffler</title>
    <!-- Importing Inter and Bebas Neue Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        /* CSS: Tropical Gradient and UI */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        body {
            /* Tropical Pink to Orange Gradient */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 30%, #fbc2eb 60%, #fad0c4 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        /* Branding Header */
        .brand-header {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .made-by {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
            margin-right: 5px;
        }

        .sammy-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 3px;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 450px;
            width: 85%;
            transition: all 0.5s ease;
        }

        .hidden { display: none !important; }

        h1 { 
            margin-bottom: 2rem; 
            font-weight: 300; 
            letter-spacing: 1px;
            font-size: 1.5rem;
        }

        button, label {
            background: white;
            color: #ff758c;
            border: none;
            padding: 16px 35px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            font-weight: 700;
            display: inline-block;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover, label:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background: #fff5f5;
        }

        input[type="file"] { display: none; }

        .loader {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 25px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        p { font-size: 0.9rem; opacity: 0.8; margin-top: 15px; }

        #downloadBtn {
            background: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Branding Header -->
    <div class="brand-header">
        <span class="made-by">MADE BY</span>
        <span class="sammy-name">SAMMY</span>
    </div>

    <!-- Page 1: Landing -->
    <div id="page1" class="container">
        <h1>Video Randomizer</h1>
        <button onclick="goToPage2()">SHUFFLE VIDEO</button>
    </div>

    <!-- Page 2: Upload & Processing -->
    <div id="page2" class="container hidden">
        <h1>Select Video</h1>
        <div id="uploadZone">
            <label for="videoInput">UPLOAD FILE</label>
            <input type="file" id="videoInput" accept="video/*">
            <p>Video quality will be preserved (Lossless)</p>
        </div>
        
        <div id="statusZone" class="hidden">
            <div class="loader"></div>
            <p id="statusText">Preparing engine...</p>
        </div>
    </div>

    <!-- Page 3: Download -->
    <div id="page3" class="container hidden">
        <h1>Success!</h1>
        <p style="margin-bottom: 20px;">Your video has been shuffled into 5s segments.</p>
        <a id="downloadBtn" download="shuffled_video.mp4">DOWNLOAD VIDEO</a>
        <br><br>
        <button onclick="location.reload()" style="background: transparent; color: white; border: 1px solid white;">START OVER</button>
    </div>

    <!-- FFmpeg.wasm Logic -->
    <script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/esm/index.js';
        import { fetchFile } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

        const ffmpeg = new FFmpeg();
        const videoInput = document.getElementById('videoInput');
        const statusZone = document.getElementById('statusZone');
        const uploadZone = document.getElementById('uploadZone');
        const statusText = document.getElementById('statusText');
        const downloadBtn = document.getElementById('downloadBtn');

        // Navigation
        window.goToPage2 = () => {
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.remove('hidden');
        };

        videoInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            uploadZone.classList.add('hidden');
            statusZone.classList.remove('hidden');

            try {
                // 1. Load FFmpeg
                statusText.innerText = "Loading processing engine...";
                if (!ffmpeg.loaded) {
                    await ffmpeg.load({
                        coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js',
                    });
                }

                // 2. Load File
                statusText.innerText = "Processing video data...";
                await ffmpeg.writeFile('input.mp4', await fetchFile(file));

                // 3. Split (Lossless - No re-encoding)
                statusText.innerText = "Splitting into 5s parts...";
                await ffmpeg.exec([
                    '-i', 'input.mp4',
                    '-c', 'copy',
                    '-f', 'segment',
                    '-segment_time', '5',
                    '-reset_timestamps', '1',
                    'out%03d.mp4'
                ]);

                // 4. Shuffle
                statusText.innerText = "Randomizing segments...";
                let files = (await ffmpeg.listDir('.')).filter(f => f.name.startsWith('out') && f.name.endsWith('.mp4'));
                
                // Fisher-Yates Shuffle
                for (let i = files.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [files[i], files[j]] = [files[j], files[i]];
                }

                // 5. Create Concat List
                const listContent = files.map(f => `file '${f.name}'`).join('\n');
                await ffmpeg.writeFile('list.txt', listContent);

                // 6. Final Merge (Lossless)
                statusText.innerText = "Merging shuffled parts...";
                await ffmpeg.exec([
                    '-f', 'concat',
                    '-safe', '0',
                    '-i', 'list.txt',
                    '-c', 'copy',
                    'final.mp4'
                ]);

                // 7. Success
                const data = await ffmpeg.readFile('final.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                downloadBtn.href = url;
                document.getElementById('page2').classList.add('hidden');
                document.getElementById('page3').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                alert("Error: To use video processing in a browser, this file must be served via a server (like Live Server or Netlify) with COOP/COEP headers enabled.");
                location.reload();
            }
        });
    </script>
</body>
</html>
