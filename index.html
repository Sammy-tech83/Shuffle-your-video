<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidShuffle</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --orange: #FF6B35; --pink: #FF3CAC; }
  body { font-family: 'Inter', sans-serif; min-height: 100vh; overflow: hidden; }

  .watermark { position:fixed; top:22px; right:28px; z-index:1000; display:flex; align-items:baseline; gap:5px; pointer-events:none; user-select:none; }
  .watermark-made { font-family:'Inter',sans-serif; font-weight:400; font-size:13px; color:rgba(255,255,255,0.85); letter-spacing:0.04em; text-shadow:0 1px 8px rgba(0,0,0,0.25); }
  .watermark-sammy { font-family:'Bebas Neue',sans-serif; font-size:20px; color:#fff; letter-spacing:0.06em; text-shadow:0 2px 12px rgba(0,0,0,0.3); }

  .page { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.65s cubic-bezier(.4,0,.2,1),transform 0.65s cubic-bezier(.4,0,.2,1); }
  .page.hidden { opacity:0; pointer-events:none; transform:scale(1.04); }

  #landing { background:linear-gradient(135deg,#FF6B35 0%,#FF3CAC 55%,#FF6B35 100%); background-size:300% 300%; animation:gradShift 7s ease infinite; }
  @keyframes gradShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

  .shapes { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .shape { position:absolute; border-radius:50%; opacity:0.12; animation:floatS linear infinite; }
  .shape:nth-child(1){width:340px;height:340px;background:#fff;top:-80px;left:-80px;animation-duration:18s}
  .shape:nth-child(2){width:200px;height:200px;background:#FFD700;bottom:-40px;right:10%;animation-duration:14s;animation-delay:-4s}
  .shape:nth-child(3){width:130px;height:130px;background:#fff;top:40%;left:10%;animation-duration:22s;animation-delay:-9s}
  .shape:nth-child(4){width:260px;height:260px;background:#FF4500;bottom:15%;left:-60px;animation-duration:16s;animation-delay:-2s}
  .shape:nth-child(5){width:90px;height:90px;background:#fff;top:15%;right:15%;animation-duration:12s;animation-delay:-6s}
  @keyframes floatS { 0%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-30px) rotate(180deg)} 100%{transform:translateY(0) rotate(360deg)} }

  .landing-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(56px,10vw,100px); color:#fff; letter-spacing:0.08em; text-align:center; line-height:1; text-shadow:0 4px 30px rgba(0,0,0,0.2); position:relative; z-index:1; margin-bottom:12px; }
  .landing-sub { font-size:15px; color:rgba(255,255,255,0.82); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:60px; position:relative; z-index:1; }

  .btn-shuffle { position:relative; z-index:1; background:#fff; border:none; border-radius:100px; padding:20px 52px; cursor:pointer; display:flex; align-items:center; gap:14px; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.1em; color:var(--orange); box-shadow:0 8px 40px rgba(0,0,0,0.18); transition:transform 0.18s,box-shadow 0.18s; }
  .btn-shuffle:hover { transform:translateY(-3px) scale(1.03); box-shadow:0 16px 50px rgba(0,0,0,0.22); }
  .btn-shuffle:active { transform:scale(0.98); }
  .shuffle-icon { width:26px; height:26px; flex-shrink:0; }

  #upload-page { background:linear-gradient(160deg,#FF6B35 0%,#FF3CAC 100%); }

  .back-btn { position:absolute; top:24px; left:28px; z-index:10; background:rgba(255,255,255,0.18); border:1.5px solid rgba(255,255,255,0.4); border-radius:100px; padding:9px 20px 9px 14px; cursor:pointer; display:flex; align-items:center; gap:6px; color:#fff; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.04em; backdrop-filter:blur(10px); transition:background 0.15s,transform 0.15s; }
  .back-btn:hover { background:rgba(255,255,255,0.3); transform:translateX(-2px); }
  .back-btn.locked { opacity:0.35; cursor:not-allowed; pointer-events:none; }

  .upload-card { background:rgba(255,255,255,0.97); border-radius:28px; padding:44px 44px 36px; width:min(92vw,520px); box-shadow:0 20px 80px rgba(0,0,0,0.22); position:relative; z-index:1; max-height:92vh; overflow-y:auto; }
  .card-title { font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:0.07em; background:linear-gradient(135deg,var(--orange),var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
  .card-sub { font-size:13px; color:#888; margin-bottom:28px; line-height:1.5; }

  .drop-zone { border:2.5px dashed #FFBCA0; border-radius:18px; background:#FFF5F0; padding:36px 20px; text-align:center; cursor:pointer; transition:border-color 0.2s,background 0.2s; position:relative; overflow:hidden; }
  .drop-zone:hover,.drop-zone.drag-over { border-color:var(--orange); background:#FFE8DF; }
  .drop-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .drop-icon { width:50px; height:50px; margin:0 auto 12px; display:block; }
  .drop-title { font-size:15px; font-weight:600; color:#333; margin-bottom:4px; }
  .drop-hint { font-size:12px; color:#bbb; }
  .file-chosen { font-size:12px; color:var(--orange); font-weight:500; margin-top:8px; word-break:break-all; }

  .btn-process { width:100%; margin-top:20px; padding:15px; border:none; border-radius:14px; background:linear-gradient(135deg,var(--orange),var(--pink)); color:#fff; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.1em; cursor:pointer; box-shadow:0 6px 24px rgba(255,60,172,0.3); transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s; }
  .btn-process:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 30px rgba(255,60,172,0.38); }
  .btn-process:disabled { opacity:0.4; cursor:not-allowed; }

  .progress-wrap { margin-top:22px; display:none; }
  .progress-wrap.show { display:block; }
  .progress-label { font-size:12px; color:#777; margin-bottom:7px; display:flex; justify-content:space-between; }
  .progress-bar-track { height:8px; background:#F0E0DA; border-radius:100px; overflow:hidden; }
  .progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--orange),var(--pink)); border-radius:100px; width:0%; transition:width 0.4s ease; }
  .status-text { font-size:12px; color:#999; margin-top:8px; min-height:18px; }

  .info-box { margin-top:12px; padding:11px 15px; border-radius:12px; background:#FFF8F0; border:1px solid #FFD0B0; font-size:12px; color:#a05020; line-height:1.6; display:none; }
  .info-box.show { display:block; }
  .info-box.err { background:#FFF0F0; border-color:#FFAAAA; color:#c02020; }

  .btn-download { display:none; width:100%; margin-top:18px; padding:15px; border:none; border-radius:14px; background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.1em; cursor:pointer; box-shadow:0 6px 24px rgba(34,197,94,0.3); transition:transform 0.15s; align-items:center; justify-content:center; gap:10px; }
  .btn-download.show { display:flex; }
  .btn-download:hover { transform:translateY(-2px); }
</style>
</head>
<body>

<div class="watermark">
  <span class="watermark-made">made by</span>
  <span class="watermark-sammy">SAMMY</span>
</div>

<!-- LANDING -->
<div class="page" id="landing">
  <div class="shapes">
    <div class="shape"></div><div class="shape"></div><div class="shape"></div>
    <div class="shape"></div><div class="shape"></div>
  </div>
  <div class="landing-title">VidShuffle</div>
  <div class="landing-sub">Remix your video in seconds</div>
  <button class="btn-shuffle" id="goToUpload">
    <svg class="shuffle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
      <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
    </svg>
    Shuffle My Video
  </button>
</div>

<!-- UPLOAD PAGE -->
<div class="page hidden" id="upload-page">
  <button class="back-btn" id="backBtn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </button>
  <div class="upload-card">
    <div class="card-title">Upload Video</div>
    <div class="card-sub">Splits into 3-second chunks, shuffles randomly, exports a compact MP4.</div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="video/*">
      <svg class="drop-icon" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="25" fill="#FFE8DF"/>
        <path d="M26 34V20M20 26l6-6 6 6" stroke="#FF6B35" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M17 36h18" stroke="#FF6B35" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      <div class="drop-title">Drop your video here</div>
      <div class="drop-hint">or click to browse · MP4, MOV, WebM…</div>
      <div class="file-chosen" id="fileChosen"></div>
    </div>

    <button class="btn-process" id="processBtn" disabled>SHUFFLE IT →</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label"><span>Processing</span><span id="pctLabel">0%</span></div>
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="status-text" id="statusText"></div>
    </div>

    <div class="info-box" id="infoBox"></div>

    <button class="btn-download" id="downloadBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download Shuffled MP4
    </button>
  </div>
</div>

<!-- MP4Box.js — pure JS MP4 parser/muxer, no workers, no SharedArrayBuffer -->
<script src="https://cdn.jsdelivr.net/npm/mp4box@0.5.2/dist/mp4box.all.min.js"></script>

<script>
/* ═══════════════════════════════════════════════════════
   VidShuffle — MP4Box approach
   ───────────────────────────────────────────────────────
   How it works:
   1. Parse the MP4 file with MP4Box to extract all samples
      (video frames + audio frames) with their timestamps
   2. Identify 3-second "chunks" by finding keyframe boundaries
   3. Shuffle the chunk order
   4. Re-write a new MP4 with samples reordered + timestamps
      remapped from 0 — completely in memory, no server needed
   5. Output is a proper H.264 MP4 the same size as the input
      (no re-encoding = no quality loss, no size inflation)
═══════════════════════════════════════════════════════ */

let selectedFile = null;
let processing   = false;

/* ── UI helpers ── */
function setP(pct, msg) {
  const p = Math.min(100, Math.round(pct));
  document.getElementById('progressFill').style.width = p + '%';
  document.getElementById('pctLabel').textContent = p + '%';
  if (msg !== undefined) document.getElementById('statusText').textContent = msg;
}
function showInfo(msg, isErr) {
  const el = document.getElementById('infoBox');
  el.textContent = msg;
  el.className = 'info-box show' + (isErr ? ' err' : '');
}
function hideInfo() { document.getElementById('infoBox').classList.remove('show'); }
function resetUI() {
  selectedFile = null; processing = false;
  document.getElementById('fileInput').value = '';
  document.getElementById('fileChosen').textContent = '';
  document.getElementById('processBtn').disabled = true;
  document.getElementById('progressWrap').classList.remove('show');
  document.getElementById('downloadBtn').classList.remove('show');
  document.getElementById('backBtn').classList.remove('locked');
  hideInfo(); setP(0,'');
}
function yield_() { return new Promise(r => setTimeout(r, 0)); }

/* ── Navigation ── */
document.getElementById('goToUpload').onclick = () => {
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('upload-page').classList.remove('hidden');
};
document.getElementById('backBtn').onclick = () => {
  if (processing) return;
  document.getElementById('upload-page').classList.add('hidden');
  document.getElementById('landing').classList.remove('hidden');
  resetUI();
};

/* ── File pick ── */
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) handleFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(f) {
  selectedFile = f;
  document.getElementById('fileChosen').textContent = `✓  ${f.name}  (${(f.size/1024/1024).toFixed(1)} MB)`;
  document.getElementById('processBtn').disabled = false;
  document.getElementById('downloadBtn').classList.remove('show');
  document.getElementById('progressWrap').classList.remove('show');
  hideInfo();
}

document.getElementById('processBtn').onclick = () => {
  if (processing || !selectedFile) return;
  processing = true;
  document.getElementById('backBtn').classList.add('locked');
  document.getElementById('processBtn').disabled = true;
  document.getElementById('progressWrap').classList.add('show');
  document.getElementById('downloadBtn').classList.remove('show');
  hideInfo();
  runShuffle(selectedFile).catch(err => {
    console.error(err);
    setP(0,'');
    showInfo('❌ ' + err.message, true);
    document.getElementById('processBtn').disabled = false;
    processing = false;
    document.getElementById('backBtn').classList.remove('locked');
  });
};

/* ═══════════════════════════════════════════════════════
   CORE SHUFFLE ENGINE
═══════════════════════════════════════════════════════ */
async function runShuffle(file) {
  setP(5, 'Reading file…');
  const arrayBuffer = await readFileAsArrayBuffer(file);

  setP(15, 'Parsing MP4 structure…');
  await yield_();

  /* ── Parse with MP4Box ── */
  const mp4 = MP4Box.createFile();
  let videoTrackId = null, audioTrackId = null;
  let videoInfo    = null, audioInfo    = null;
  let videoSamples = [], audioSamples  = [];

  await new Promise((resolve, reject) => {
    mp4.onReady = (info) => {
      for (const track of info.tracks) {
        if (track.type === 'video' && !videoTrackId) {
          videoTrackId = track.id;
          videoInfo    = track;
          mp4.setExtractionOptions(track.id, null, { nbSamples: Infinity });
        } else if (track.type === 'audio' && !audioTrackId) {
          audioTrackId = track.id;
          audioInfo    = track;
          mp4.setExtractionOptions(track.id, null, { nbSamples: Infinity });
        }
      }
      if (!videoTrackId) { reject(new Error('No video track found. Please use an MP4 file.')); return; }
      mp4.start();
    };

    mp4.onSamples = (trackId, user, samples) => {
      if (trackId === videoTrackId) videoSamples.push(...samples);
      else if (trackId === audioTrackId) audioSamples.push(...samples);
    };

    mp4.onError = (e) => reject(new Error('MP4 parse error: ' + e));

    // Feed the buffer
    const buf = arrayBuffer.slice(0);
    buf.fileStart = 0;
    mp4.appendBuffer(buf);
    mp4.flush();

    // Give it a tick to finish parsing
    setTimeout(() => resolve(), 300);
  });

  await yield_();

  if (!videoSamples.length) throw new Error('Could not extract video frames. Make sure the file is a valid H.264 MP4.');

  setP(35, `Parsed ${videoSamples.length} video frames…`);
  await yield_();

  /* ── Find keyframe boundaries for 3-second chunks ── */
  const CHUNK_SEC  = 3;
  const timescale  = videoInfo.timescale || 90000;
  const chunkTicks = CHUNK_SEC * timescale;

  // Group samples into chunks starting at each keyframe that falls on a 3s boundary
  // Strategy: split at every keyframe where cts >= next 3s mark
  const chunks = [];  // each chunk = array of video sample indices
  let currentChunk = [];
  let nextBoundary = 0;

  for (let i = 0; i < videoSamples.length; i++) {
    const s   = videoSamples[i];
    const cts = s.cts !== undefined ? s.cts : s.dts;

    if (s.is_sync && cts >= nextBoundary && currentChunk.length > 0) {
      chunks.push(currentChunk);
      currentChunk = [];
      // Advance boundary past current position
      while (nextBoundary <= cts) nextBoundary += chunkTicks;
    }

    if (nextBoundary === 0) nextBoundary = chunkTicks;
    currentChunk.push(i);
  }
  if (currentChunk.length) chunks.push(currentChunk);

  if (chunks.length < 2) throw new Error(`Only found ${chunks.length} chunk(s). The video may be too short or have no keyframes at 3s intervals. Try a longer video.`);

  setP(50, `${chunks.length} chunks found — shuffling…`);
  await yield_();

  /* ── Fisher-Yates shuffle chunks ── */
  for (let i = chunks.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [chunks[i], chunks[j]] = [chunks[j], chunks[i]];
  }

  /* ── Build reordered sample list ── */
  setP(55, 'Reordering samples…');
  await yield_();

  const reorderedVideo = chunks.flat().map(i => videoSamples[i]);

  /* ── Remap video timestamps from 0 ── */
  let cursor = 0;
  const remappedVideo = reorderedVideo.map((s, idx) => {
    const dur = s.duration || (idx < reorderedVideo.length - 1
      ? reorderedVideo[idx + 1].dts - s.dts
      : s.duration || 1);
    const out = Object.assign({}, s, { dts: cursor, cts: cursor, pts: cursor });
    cursor += dur > 0 ? dur : (s.duration || 1);
    return out;
  });

  /* ── Map audio to match new video timeline ── */
  let remappedAudio = [];
  if (audioSamples.length && audioInfo) {
    // Build a map: for each video chunk (original time range) → new start time
    // Audio samples whose DTS falls in an original video chunk get shifted to
    // the new position of that chunk.
    const videoTimescale = timescale;
    const audioTimescale = audioInfo.timescale || 44100;

    // Build chunk time ranges (original dts of first/last sample)
    const chunkRanges = chunks.map(chunk => {
      const first = videoSamples[chunk[0]];
      const last  = videoSamples[chunk[chunk.length - 1]];
      return {
        origStart: first.dts,
        origEnd:   last.dts + (last.duration || 0),
      };
    });

    // Build new chunk start times in audio timescale
    let newChunkStarts = [];
    let vCursor = 0;
    for (let ci = 0; ci < chunks.length; ci++) {
      const chunk      = chunks[ci];
      const chunkDur   = chunk.reduce((s, i) => s + (videoSamples[i].duration || 0), 0);
      newChunkStarts.push(vCursor);
      vCursor += chunkDur;
    }

    // Convert new starts to audio timescale
    const newChunkStartsAudio = newChunkStarts.map(t =>
      Math.round(t * audioTimescale / videoTimescale)
    );

    // For each audio sample, find which original chunk it belongs to
    const chunkRangesAudio = chunkRanges.map(r => ({
      origStart: Math.round(r.origStart * audioTimescale / videoTimescale),
      origEnd:   Math.round(r.origEnd   * audioTimescale / videoTimescale),
    }));

    let audioCursor = 0;
    let pendingAudio = [];

    for (let ci = 0; ci < chunks.length; ci++) {
      const { origStart, origEnd } = chunkRangesAudio[ci];
      const inChunk = audioSamples.filter(s => s.dts >= origStart && s.dts < origEnd);
      for (const s of inChunk) {
        const offset = s.dts - origStart;
        pendingAudio.push({ ...s, dts: audioCursor + offset, cts: audioCursor + offset });
      }
      // Advance audio cursor by chunk duration
      audioCursor = newChunkStartsAudio[ci] +
        (ci < chunks.length - 1 ? newChunkStartsAudio[ci + 1] - newChunkStartsAudio[ci]
                                 : (chunkRangesAudio[ci].origEnd - chunkRangesAudio[ci].origStart));
    }

    remappedAudio = pendingAudio.sort((a, b) => a.dts - b.dts);
  }

  setP(68, 'Writing new MP4…');
  await yield_();

  /* ── Build output MP4 with MP4Box ── */
  const outFile = MP4Box.createFile();

  // Add video track
  const vtConfig = {
    type:        videoInfo.codec.startsWith('avc') ? 'avc1' : videoInfo.codec,
    width:       videoInfo.video ? videoInfo.video.width  : 1280,
    height:      videoInfo.video ? videoInfo.video.height : 720,
    timescale:   timescale,
    duration:    cursor,
    avcDecoderConfigRecord: getDecoderConfig(mp4, videoTrackId),
  };
  const outVideoId = outFile.addTrack(vtConfig);

  // Add audio track if present
  let outAudioId = null;
  if (remappedAudio.length && audioInfo) {
    try {
      const atConfig = {
        type:       'mp4a',
        timescale:  audioInfo.timescale || 44100,
        channel_count: audioInfo.audio ? audioInfo.audio.channel_count : 2,
        samplesize:    16,
        samplerate:    audioInfo.audio ? audioInfo.audio.sample_rate   : 44100,
        hdlr:         'soun',
      };
      outAudioId = outFile.addTrack(atConfig);
    } catch(e) { console.warn('Audio track add failed:', e); outAudioId = null; }
  }

  /* Add video samples in batches to avoid blocking UI */
  const BATCH = 200;
  for (let i = 0; i < remappedVideo.length; i += BATCH) {
    const pct = 68 + ((i / remappedVideo.length) * 20);
    setP(pct, `Writing frames ${i}–${Math.min(i+BATCH, remappedVideo.length)} of ${remappedVideo.length}…`);

    for (let j = i; j < Math.min(i + BATCH, remappedVideo.length); j++) {
      const s = remappedVideo[j];
      try {
        outFile.addSample(outVideoId, s.data, {
          duration:  s.duration || 1,
          dts:       s.dts,
          cts:       s.cts,
          is_sync:   s.is_sync || false,
        });
      } catch(_) {}
    }
    await yield_();
  }

  /* Add audio samples */
  if (outAudioId && remappedAudio.length) {
    setP(89, 'Writing audio…');
    for (const s of remappedAudio) {
      try {
        outFile.addSample(outAudioId, s.data, {
          duration: s.duration || 1,
          dts:      s.dts,
          cts:      s.cts,
          is_sync:  true,
        });
      } catch(_) {}
    }
    await yield_();
  }

  setP(92, 'Packaging MP4…');
  await yield_();

  /* ── Export to ArrayBuffer ── */
  const outBuffer = outFile.getBuffer();
  if (!outBuffer || outBuffer.byteLength < 100) throw new Error('Output MP4 is empty. Please try again.');

  const blob = new Blob([outBuffer], { type: 'video/mp4' });
  const url  = URL.createObjectURL(blob);

  setP(100, `Done! · ${(blob.size/1024/1024).toFixed(1)} MB`);

  const base   = file.name.replace(/\.[^/.]+$/, '');
  const dlBtn  = document.getElementById('downloadBtn');
  dlBtn.classList.add('show');
  dlBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = url; a.download = base + '_shuffled.mp4'; a.click();
  };

  processing = false;
  document.getElementById('backBtn').classList.remove('locked');
}

/* ── Get AVC decoder config record from parsed MP4 ── */
function getDecoderConfig(mp4, trackId) {
  try {
    const trak = mp4.getTrackById(trackId);
    if (!trak) return null;
    const entry = trak.mdia.minf.stbl.stsd.entries[0];
    if (entry && entry.avcC) return entry.avcC;
    return null;
  } catch(_) { return null; }
}

/* ── Read File as ArrayBuffer ── */
function readFileAsArrayBuffer(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = e => resolve(e.target.result);
    reader.onerror = () => reject(new Error('Failed to read file'));
    reader.readAsArrayBuffer(file);
  });
}
