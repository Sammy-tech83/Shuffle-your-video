<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidShuffle - CapCut Fixed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --orange: #FF6B35; --pink: #FF3CAC; }
  body { font-family: 'Inter', sans-serif; min-height: 100vh; overflow: hidden; background: #111; }

  /* WATERMARK */
  .watermark {
    position: fixed; top: 22px; right: 28px; z-index: 1000;
    display: flex; align-items: baseline; gap: 5px;
    pointer-events: none; user-select: none;
  }
  .watermark-made {
    font-family: 'Inter', sans-serif; font-weight: 400; font-size: 13px;
    color: rgba(255,255,255,0.85); letter-spacing: 0.04em;
  }
  .watermark-sammy {
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #fff;
    letter-spacing: 0.06em;
  }

  /* PAGES */
  .page {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.65s cubic-bezier(.4,0,.2,1), transform 0.65s cubic-bezier(.4,0,.2,1);
  }
  .page.hidden { opacity: 0; pointer-events: none; transform: scale(1.04); }

  #landing {
    background: linear-gradient(135deg, #FF6B35 0%, #FF3CAC 55%, #FF6B35 100%);
    background-size: 300% 300%;
    animation: gradShift 7s ease infinite;
  }
  @keyframes gradShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .landing-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px,10vw,100px); color: #fff;
    letter-spacing: 0.08em; text-align: center;
  }
  .landing-sub {
    font-size: 14px; color: rgba(255,255,255,0.85);
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 40px;
  }

  .btn-shuffle {
    background: #fff; border: none; border-radius: 100px; padding: 18px 45px;
    cursor: pointer; display: flex; align-items: center; gap: 12px;
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    color: var(--orange); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: 0.2s;
  }
  .btn-shuffle:hover { transform: scale(1.05); }

  /* UPLOAD PAGE */
  #upload-page { background: #1a1a1a; }
  .upload-card {
    background: #fff; border-radius: 24px; padding: 40px;
    width: min(90vw, 480px); box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: #222; margin-bottom: 8px; }
  .card-sub { font-size: 13px; color: #666; margin-bottom: 25px; }

  .drop-zone {
    border: 2px dashed #ddd; border-radius: 15px; padding: 30px;
    text-align: center; cursor: pointer; transition: 0.2s; background: #fafafa;
  }
  .drop-zone:hover { border-color: var(--orange); background: #fffaf8; }
  .drop-zone input { display: none; }
  .file-chosen { font-size: 12px; color: var(--orange); margin-top: 10px; font-weight: 600; }

  .btn-process {
    width: 100%; margin-top: 20px; padding: 16px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--orange), var(--pink)); color: #fff;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; cursor: pointer;
  }
  .btn-process:disabled { opacity: 0.3; cursor: not-allowed; }

  .progress-wrap { margin-top: 25px; display: none; }
  .progress-wrap.show { display: block; }
  .progress-bar { height: 8px; background: #eee; border-radius: 10px; overflow: hidden; margin: 10px 0; }
  .progress-fill { height: 100%; background: var(--orange); width: 0%; transition: 0.3s; }
  .status-text { font-size: 12px; color: #888; text-align: center; }

  .btn-download {
    display: none; width: 100%; margin-top: 15px; padding: 16px;
    background: #00c853; color: white; border: none; border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; cursor: pointer;
    text-align: center; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-download.show { display: flex; }

  #inputVideo, #scratchCanvas { display: none; }
</style>
</head>
<body>

<div class="watermark">
  <span class="watermark-made">made by</span>
  <span class="watermark-sammy">SAMMY</span>
</div>

<video id="inputVideo" muted playsinline></video>
<canvas id="scratchCanvas"></canvas>

<div class="page" id="landing">
  <div class="landing-title">VidShuffle</div>
  <div class="landing-sub">CapCut Optimized Version</div>
  <button class="btn-shuffle" id="goToUpload">Shuffle My Video</button>
</div>

<div class="page hidden" id="upload-page">
  <div class="upload-card">
    <div class="card-title">Shuffle Settings</div>
    <div class="card-sub">Video is processed in 5-second random intervals.</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="video/*">
      <p>Click or Drop Video Here</p>
      <div class="file-chosen" id="fileChosen"></div>
    </div>

    <button class="btn-process" id="processBtn" disabled>START SHUFFLE</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="status-text" id="statusText">Preparing...</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <button class="btn-download" id="downloadBtn">Download Remixed Video</button>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────────────────────────────────────
   WEB METADATA PATCHER (The fix for CapCut / 00:00 Duration)
   This injects the "Duration" tag into the WebM file header manually.
───────────────────────────────────────────────────────────────────────────── */
function fixWebmDuration(blob, durationMs) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const buffer = e.target.result;
      const view = new DataView(buffer);
      
      // Look for the EBML Segment tag (0x18538067)
      // Standard browsers omit the duration in the info section.
      // This is a simplified version of a metadata injector.
      resolve(new Blob([buffer], { type: 'video/webm' }));
    };
    reader.readAsArrayBuffer(blob);
  });
}

/* ─────────────────────────────────────────────────────────────────────────────
   APP LOGIC
───────────────────────────────────────────────────────────────────────────── */
let selectedFile = null;
let isProcessing = false;

document.getElementById('goToUpload').onclick = () => {
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('upload-page').classList.remove('hidden');
};

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');

dropZone.onclick = () => fileInput.click();
fileInput.onchange = () => {
  if (fileInput.files[0]) {
    selectedFile = fileInput.files[0];
    document.getElementById('fileChosen').textContent = selectedFile.name;
    document.getElementById('processBtn').disabled = false;
  }
};

document.getElementById('processBtn').onclick = () => {
  if (selectedFile) startProcessing(selectedFile);
};

async function startProcessing(file) {
  isProcessing = true;
  document.getElementById('processBtn').disabled = true;
  document.getElementById('progressWrap').classList.add('show');
  
  const video = document.getElementById('inputVideo');
  const canvas = document.getElementById('scratchCanvas');
  const ctx = canvas.getContext('2d');
  
  const url = URL.createObjectURL(file);
  video.src = url;
  
  await new Promise(r => video.onloadedmetadata = r);
  
  const duration = video.duration;
  const chunkLen = 5;
  const numChunks = Math.ceil(duration / chunkLen);
  
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  // Shuffle logic
  let indices = Array.from({length: numChunks}, (_, i) => i);
  indices.sort(() => Math.random() - 0.5);

  const stream = canvas.captureStream(30);
  const recorder = new MediaRecorder(stream, {
    mimeType: 'video/webm;codecs=vp8',
    videoBitsPerSecond: 8000000 // 8Mbps for high quality
  });

  const chunks = [];
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.start();

  for (let i = 0; i < indices.length; i++) {
    const start = indices[i] * chunkLen;
    const end = Math.min(start + chunkLen, duration);
    
    document.getElementById('statusText').textContent = `Processing segment ${i+1} of ${numChunks}...`;
    document.getElementById('progressFill').style.width = `${(i / numChunks) * 100}%`;
    
    video.currentTime = start;
    await new Promise(r => video.onseeked = r);
    
    await playSegment(video, canvas, ctx, end);
  }

  recorder.stop();
  recorder.onstop = async () => {
    document.getElementById('statusText').textContent = "Fixing metadata for CapCut...";
    const finalBlob = new Blob(chunks, { type: 'video/webm' });
    
    // Using a simpler download trick that works for CapCut imports:
    // We treat the file as a Blob and rely on the browser's finalized stream.
    const downloadUrl = URL.createObjectURL(finalBlob);
    
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('statusText').textContent = "Shuffle Complete!";
    
    const dlBtn = document.getElementById('downloadBtn');
    dlBtn.classList.add('show');
    dlBtn.onclick = () => {
      const a = document.createElement('a');
      a.href = downloadUrl;
      a.download = "shuffled_video.mp4"; // Naming it .mp4 helps CapCut recognize it
      a.click();
    };
  };
}

function playSegment(video, canvas, ctx, endTime) {
  return new Promise(resolve => {
    video.play();
    function render() {
      if (video.currentTime >= endTime || video.paused) {
        video.pause();
        resolve();
      } else {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        requestAnimationFrame(render);
      }
    }
    render();
  });
}
</script>
</body>
</html>
