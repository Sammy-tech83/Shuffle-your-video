<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Shuffler | SAMMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ff9a44 0%, #fc6076 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .branding {
            position: absolute;
            top: 20px;
            right: 30px;
            text-align: right;
            z-index: 10;
        }
        .made-by { font-family: 'Inter', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }
        .sammy { font-family: 'Bebas Neue', sans-serif; font-size: 28px; display: block; line-height: 1; }

        .page { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; text-align: center; }
        .page.active { display: flex; }

        button {
            background: white;
            color: #fc6076;
            border: none;
            padding: 15px 40px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        button:hover { transform: scale(1.05); }

        .upload-box {
            border: 2px dashed rgba(255,255,255,0.7);
            padding: 60px 20px;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        input[type="file"] { display: none; }

        .progress-container {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 20px 0;
            display: none;
            overflow: hidden;
        }
        #progressBar { width: 0%; height: 100%; background: white; transition: width 0.2s; }
        #status { font-size: 14px; margin-top: 10px; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="branding">
        <span class="made-by">Made by</span>
        <span class="sammy">SAMMY</span>
    </div>

    <!-- Page 1 -->
    <div id="page1" class="page active">
        <button onclick="goToPage(2)">Shuffle Video</button>
    </div>

    <!-- Page 2 -->
    <div id="page2" class="page">
        <h2 style="font-family: 'Bebas Neue'; font-size: 45px;">Upload Video</h2>
        
        <label class="upload-box" id="dropZone" for="videoInput">
            <span style="font-weight: bold;">SELECT VIDEO FILE</span>
            <p style="font-size: 12px; margin-top: 10px; opacity: 0.8;">(Original Quality Maintained)</p>
        </label>
        <input type="file" id="videoInput" accept="video/*">
        
        <div class="progress-container" id="pContainer">
            <div id="progressBar"></div>
        </div>
        <div id="status"></div>

        <button id="downloadBtn" style="display: none; margin-top: 20px;">Download Shuffled Video</button>
    </div>

    <!-- Scripting -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.umd.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    
    <script>
        const { FFmpeg } = FFmpegWasm;
        const { fetchFile, toBlobURL } = FFmpegUtil;
        let ffmpeg = null;

        function goToPage(pageNum) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page${pageNum}`).classList.add('active');
        }

        const videoInput = document.getElementById('videoInput');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const pContainer = document.getElementById('pContainer');
        const downloadBtn = document.getElementById('downloadBtn');

        videoInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // CHECK FOR CROSS-ORIGIN ISOLATION
            if (!window.crossOriginIsolated) {
                alert("SECURITY ERROR: This app requires a secure server environment. It cannot run by just double-clicking the file. Please use 'Live Server' in VS Code or host it on Vercel/Netlify.");
                return;
            }

            try {
                document.getElementById('dropZone').style.display = 'none';
                pContainer.style.display = 'block';
                status.innerText = "Initializing Engine...";

                if (!ffmpeg) {
                    ffmpeg = new FFmpeg();
                    ffmpeg.on('progress', ({ progress }) => {
                        progressBar.style.width = Math.round(progress * 100) + '%';
                    });

                    await ffmpeg.load({
                        coreURL: await toBlobURL(`https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js`, 'text/javascript'),
                        wasmURL: await toBlobURL(`https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm`, 'application/wasm'),
                    });
                }

                status.innerText = "Analyzing & Cutting (5s segments)...";
                await ffmpeg.writeFile('input', await fetchFile(file));

                // Command to segment video without re-encoding (-c copy)
                await ffmpeg.exec(['-i', 'input', '-f', 'segment', '-segment_time', '5', '-c', 'copy', '-reset_timestamps', '1', 'out%d.mp4']);

                const files = await ffmpeg.listDir('.');
                let segments = files.filter(f => f.name.startsWith('out') && f.name.endsWith('.mp4')).map(f => f.name);

                status.innerText = `Shuffling ${segments.length} segments...`;
                
                // Shuffle
                for (let i = segments.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [segments[i], segments[j]] = [segments[j], segments[i]];
                }

                // Create Concat List
                const list = segments.map(s => `file '${s}'`).join('\n');
                await ffmpeg.writeFile('list.txt', list);

                status.innerText = "Joining segments together...";
                await ffmpeg.exec(['-f', 'concat', '-safe', '0', '-i', 'list.txt', '-c', 'copy', 'final.mp4']);

                status.innerText = "Success! Ready to Download.";
                progressBar.style.width = '100%';

                const data = await ffmpeg.readFile('final.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                downloadBtn.style.display = 'block';
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'shuffled_by_sammy.mp4';
                    a.click();
                };

            } catch (err) {
                console.error(err);
                status.innerText = "Error: " + err.message;
            }
        });
    </script>
</body>
</html>
